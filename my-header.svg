<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Scanline texture -->
    <pattern id="scanlines" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" fill="rgba(255,255,255,0.025)" y="0"/>
      <rect width="900" height="3" fill="transparent" y="1"/>
    </pattern>

    <!-- Subtle grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Glow for accent -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle gradient bg -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="60%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <!-- White accent gradient for line -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Cursor blink -->
    <rect id="cursor" width="3" height="38" fill="#ffffff"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Scanlines overlay -->
  <rect width="900" height="220" fill="url(#scanlines)"/>

  <!-- Top border line (animated) -->
  <rect x="0" y="0" width="900" height="1" fill="url(#accentLine)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom border line -->
  <rect x="0" y="219" width="900" height="1" fill="url(#accentLine)" opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="52" y="30" width="2" height="160" fill="#ffffff" opacity="0.15"/>

  <!-- Right accent bar -->
  <rect x="846" y="30" width="2" height="160" fill="#ffffff" opacity="0.15"/>

  <!-- Corner marks - top left -->
  <path d="M20,20 L20,48 M20,20 L48,20" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Corner marks - top right -->
  <path d="M880,20 L880,48 M880,20 L852,20" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Corner marks - bottom left -->
  <path d="M20,200 L20,172 M20,200 L48,200" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Corner marks - bottom right -->
  <path d="M880,200 L880,172 M880,200 L852,200" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Prompt indicator -->
  <text x="72" y="82" font-family="'Courier New', Courier, monospace" font-size="13" fill="#555555" letter-spacing="1">
    ~/schweizerwilsemann $
  </text>

  <!-- Main name - large, bold, white -->
  <text x="72" y="138" font-family="'Courier New', Courier, monospace" font-size="54" font-weight="bold" fill="#ffffff" letter-spacing="-1" filter="url(#glow)">
    nguyen duc khoa
  </text>

  <!-- Blinking cursor after name -->
  <rect x="648" y="100" width="3" height="44" fill="#ffffff">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle line -->
  <text x="72" y="168" font-family="'Courier New', Courier, monospace" font-size="13" fill="#555555" letter-spacing="2">
    BACKEND · DEVOPS · AI · まさとし
  </text>

  <!-- Status indicator -->
  <circle cx="74" cy="194" r="4" fill="#22c55e">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;4.5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="86" y="198" font-family="'Courier New', Courier, monospace" font-size="11" fill="#22c55e" letter-spacing="1">
    online · open to work
  </text>

  <!-- Right side: decorative grid -->
  <g opacity="0.06">
    <line x1="780" y1="20" x2="780" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="810" y1="20" x2="810" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="840" y1="20" x2="840" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="750" y1="50" x2="870" y2="50" stroke="#ffffff" stroke-width="1"/>
    <line x1="750" y1="80" x2="870" y2="80" stroke="#ffffff" stroke-width="1"/>
    <line x1="750" y1="110" x2="870" y2="110" stroke="#ffffff" stroke-width="1"/>
    <line x1="750" y1="140" x2="870" y2="140" stroke="#ffffff" stroke-width="1"/>
    <line x1="750" y1="170" x2="870" y2="170" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Grain filter overlay -->
  <rect width="900" height="220" fill="#0d0d0d" opacity="0.05" filter="url(#grain)"/>
</svg>
